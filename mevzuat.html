<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="2; url=https://www.alomaliye.com/is_guvenligi_tuzuk_ana_sayfa.htm">
    <title>Mevzuat | Kalicert İSG</title>
    <link rel="stylesheet" href="style.css">
    <style>body{display:flex; justify-content:center; align-items:center; height:100vh; background:#f4f4f4;} .box{text-align:center; background:#fff; padding:40px; border-radius:8px; box-shadow:0 10px 30px rgba(0,0,0,0.1); border-top:4px solid var(--primary-color);} .spinner {border: 4px solid #f3f3f3; border-top: 4px solid var(--secondary-color); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto;} @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
</head>
<body>
    <div class="box">
        <h2 style="color:var(--primary-color);">Mevzuat Sayfasına Yönlendiriliyorsunuz...</h2>
        <div class="spinner"></div>
        <p style="color:#666;">Lütfen bekleyin, güncel tüzük sayfasına aktarılacaksınız.</p>
    </div>
</body>
</html>
